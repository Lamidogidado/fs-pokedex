name: Hello World

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  hello_world_job:
    runs-on: ubuntu-22.04
    steps:
      - name: Say Hello
        run: echo "Hello World!"
      - name: Now
        run: date
      - name: Directory Content
        run: ls -l
